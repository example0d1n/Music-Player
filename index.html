<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/jpeg" href="photo/ab67616d0000b2738aa339341a0b0c813909c831.jpeg" />
    <script src="https://kit.fontawesome.com/7a7009d613.js" crossorigin="anonymous"></script>
    <title>Music Player</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="music-player">
                <nav>
                    <div class="circle">
                        <i class="fa-solid fa-chevron-left"></i>
                    </div>
                    <div class="circle">
                        <i class="fa-solid fa-bars"></i>
                    </div>
                </nav>
                <img src="photo/ab67616d0000b2738aa339341a0b0c813909c831.jpeg" class="song-image"/>
                <h1>Ride</h1>
                <p>The Marías — Submarine </p>

                <audio controls id="song">
                    <source src="playlist/Ride - The Marías.mp3" type="audio/mpeg">
                </audio>
                <input type="range" value="0" id="progress">

                <div class="controls">
                    <div><i class="fa-solid fa-backward-step"></i></div>
                    <div onclick="playPause()"><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
                    <div><i class="fa-solid fa-forward-step"></i></div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
